name: demo shots

# Regenerate the README product shots (assets/hero-{light,dark}.png) with
# vhs. Run manually, or automatically when the demo tooling changes.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["demo/**"]

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - uses: Swatinem/rust-cache@v2

      - name: Install vibin
        run: cargo install --path . --locked

      # installed directly instead of via vhs-action: the action pulls
      # ffmpeg from BtbN's GitHub releases (fails intermittently) and
      # ignores a system ffmpeg entirely. apt is boring and works.
      # fonts-jetbrains-mono = vhs's default font.
      - name: Install vhs
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ffmpeg fonts-jetbrains-mono
          sudo curl -fsSL -o /usr/local/bin/ttyd \
            https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64
          sudo chmod +x /usr/local/bin/ttyd
          vhs --version && ttyd --version && ffmpeg -version | head -1

      - name: Record
        run: demo/record.sh

      # gifs are gitignored (regenerable); publish them as run artifacts
      - name: Upload recordings
        uses: actions/upload-artifact@v4
        with:
          name: demo-recordings
          path: |
            assets/demo-light.gif
            assets/demo-dark.gif
            assets/hero-light.png
            assets/hero-dark.png

      - name: Commit refreshed heroes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/hero-light.png assets/hero-dark.png
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Regenerate demo shots [skip ci]"
          git push
