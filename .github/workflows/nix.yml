name: nix

# Builds the flake on both OSes so the derivation (and its per-platform
# deps — vendored libgit2, arboard's X11/Wayland libs) stays green. The
# release binaries come from release.yml; this just guards `nix build`.
on:
  push:
    branches: [main]
    paths: ["flake.nix", "flake.lock", "Cargo.toml", "Cargo.lock", "src/**", "build.rs", "grammars/**", "vendor/**"]
  pull_request:
    paths: ["flake.nix", "flake.lock", "Cargo.toml", "Cargo.lock", "src/**", "build.rs", "grammars/**", "vendor/**"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      # no binary cache wired up — a cold build is ~2 min. if that gets
      # annoying, add nix-community/cache-nix-action (GitHub-hosted store
      # cache) or enroll in FlakeHub Cache here.
      - name: Build
        run: nix build .#vibin --print-build-logs

      - name: Smoke test
        run: ./result/bin/vibin +version
